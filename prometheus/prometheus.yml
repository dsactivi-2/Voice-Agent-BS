global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:3000']
    metrics_path: '/metrics'

  - job_name: 'management-api'
    static_configs:
      - targets: ['management-api:3001']
    metrics_path: '/metrics'
